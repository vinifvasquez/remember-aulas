<html>
<head>
  <title>Formulários do HTML</title>
</head>
<body>
  <h1>Formulários do HTML</h1>

    <form action="http://google.com/search" method="get">
      <label for="pesquisa">Pesquise no Google:</label>
      <input type="text" name="q" id="pesquisa">
      <button type="submit">Pesquisar</button>
    </form>
  <hr>
    <!--Campo de formularios-->
    <!--CAmpo "For e id" são interligados com conexão-->
    <!--Campo "name" é para o uso com o banco de dos -->
    <!--Input é onde terá uma tipo de dado colocado
    Ex: text, email, password-->
    <form>
    <center>
      <!--Campo de nome-->
        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" name="nome" required><br>
      <Br>
      
      <!--Campo de email-->
        <label for="email">E-mail:</label><br>
        <input type="email" id="email" name="nome" required><br>
      <br>
      <!--Campo de senha-->
        <label for="senha">Senha:</label><br>
        <input type="password" id="senha" name="senha" required placeholder="senha"><br>

      <br>
      <!--seleção de radio-->
        <label>Genero</label><br>
        <input type="radio" name="genero" id="masculino" required value="M">
        <label for="masculino">Masculino</label>
        <input type="radio" name="genero" id="femenino" required value="F">
        <label for="femenino">femenino</label><br>
      <br>

      <!-- Campo de seleção múltipla usando inputs de checkbox -->
        <label>Interesses:</label><br>
        <input type="checkbox" id="backend" name="interesses" value="backend">
        <label for="backend">Back-end</label>
        <input type="checkbox" id="frontend" name="interesses" value="frontend">
        <label for="frontend">Front-end</label>
        <input type="checkbox" id="mobile" name="interesses" value="mobile"><br>
        <label for="mobile">Mobile</label><br>
    <br>

      <!-- Campo de data -->
        <label for="dataNascimento">Data de Nascimento:</label>
        <input type="date" id="dataNascimento" name="dataNascimento">
    <br><br>

      <!-- Campo de número -->
        <label for="idade">Idade:</label><br>
        <input type="number" id="idade" name="idade" min="18" max="100"><br>
    <br>

    <!--Campo de arquivo(uploads)-->
    <label for="arquivo">Arquivo:</label><br>
    <input type="file" id="arquivo" name="arquivo"><br>

    <br>
    <!--Função de select-->
    <label for="tipo">Situação Atual:</label><br>
    <select name="tipo" id="tipo">
      <option value="" selected disabled>escolha uma opção</option>
      <option value=""  >Aprender a ser Dev Front-end</option>
      <option value=""  >Aprender a ser Dev Back-end</option>
    </select><br>
    <br>
      <button type="submit">Enviar</button>
    
    </center>

    </form>

</body>
</html>
